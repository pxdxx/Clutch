<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clutch — редактор</title>
    <link rel="stylesheet" href="./editor.css" />
  </head>
  <body>
    <div class="toolbar">

      <div class="toolGroup">
        <button class="tool active" data-tool="arrow" title="Стрелка">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="19" x2="19" y2="5"/>
            <polyline points="13 5 19 5 19 11"/>
          </svg>
        </button>
        <button class="tool" data-tool="pen" title="Карандаш">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
          </svg>
        </button>
        <button class="tool" data-tool="rect" title="Рамка">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
        </button>
      </div>

      <div class="sep"></div>

      <div class="toolGroup">
        <label class="colorWrap" title="Цвет">
          <div class="colorSwatch" id="swatch"></div>
          <input type="color" id="color" value="#ef4444" />
        </label>
        <div class="strokeWrap">
          <input type="range" id="width" min="2" max="14" value="4" />
        </div>
      </div>

      <div class="sep"></div>

      <div class="toolGroup">
        <button class="tool" id="undo" title="Отменить (Ctrl+Z)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 14 4 9 9 4"/>
            <path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
          </svg>
        </button>
      </div>

      <div class="spacer"></div>

      <div class="toolGroup">
        <button class="action" id="copy" title="Копировать">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Копировать
        </button>
        <button class="action primary" id="save" title="Сохранить">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Сохранить
        </button>
      </div>

    </div>

    <div class="canvas-area">
      <canvas id="cv"></canvas>
    </div>

    <div class="toast" id="toast"></div>

    <script src="./editor.js"></script>
  </body>
</html>
