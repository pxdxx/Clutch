<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clutch</title>
    <link rel="icon" type="image/png" href="../icons/png/clutch-icon-48.png" />
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <div class="app">

      <div class="header">
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <span class="appname">Clutch</span>
        <div class="status" id="statusDot" title="Горячие клавиши активны"></div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="row">
          <div class="rowIcon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <span class="rowLabel">Быстрый кадр</span>
          <div class="shortcutBtn" id="quickShortcut" tabindex="0" role="button"></div>
        </div>
        <div class="row">
          <div class="rowIcon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>
          <span class="rowLabel">Редактор</span>
          <div class="shortcutBtn" id="annotateShortcut" tabindex="0" role="button"></div>
        </div>
        <div class="row rowToggle">
          <div class="rowIcon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="m16.24 7.76 2.83-2.83"/>
            </svg>
          </div>
          <span class="rowLabel">Запускать при старте системы</span>
          <label class="toggle" title="Появится в «Автозагрузке» диспетчера задач Windows">
            <input type="checkbox" id="openAtLogin" />
            <span class="toggleTrack" aria-hidden="true"></span>
          </label>
        </div>
      </div>

      <div class="divider"></div>

      <div class="footer">
        <button class="btn" id="save">Сохранить</button>
        <div id="saveMsg" class="saveMsg"></div>
      </div>

    </div>
    <script src="./settings.js"></script>
  </body>
</html>
